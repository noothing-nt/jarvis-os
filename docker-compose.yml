# ══════════════════════════════════════════════════════════════
#  JARVIS OS — Docker Compose
#  Runs the backend locally with live reload for development.
#  Usage: docker-compose up --build
# ══════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── JARVIS Backend ────────────────────────────────────────
  jarvis-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jarvis-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload in dev
      - ./backend:/home/jarvis/app
      # Mount Google Drive credentials separately (never bake into image)
      - ./backend/gdrive_credentials.json:/home/jarvis/app/gdrive_credentials.json:ro
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=True
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── JARVIS Frontend (optional — normally served by Netlify) ──
  jarvis-frontend:
    image: node:20-alpine
    container_name: jarvis-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - jarvis-backend

networks:
  default:
    name: jarvis-network